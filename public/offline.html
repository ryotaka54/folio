<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Offline — Applyd</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    body {
      background: #0A0A0A;
      color: #F9FAFB;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      text-align: center;
    }
    .icon {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      background: #2563EB;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    .icon svg { display: block; }
    h1 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 10px;
    }
    p {
      font-size: 15px;
      line-height: 1.6;
      color: #A1A1AA;
      max-width: 340px;
      margin-bottom: 32px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(37,99,235,0.12);
      border: 1px solid rgba(37,99,235,0.25);
      color: #60A5FA;
      font-size: 13px;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 999px;
    }
    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #60A5FA;
      animation: pulse 1.8s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    button {
      margin-top: 20px;
      display: block;
      background: #2563EB;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 22px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #1D4ED8; }
  </style>
</head>
<body>
  <div class="icon">
    <svg width="36" height="36" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M14 36 L22 26 L30 32 L38 20 L44 26" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <circle cx="44" cy="26" r="4" fill="white"/>
      <line x1="44" y1="34" x2="44" y2="44" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="2 3"/>
    </svg>
  </div>
  <h1>You are offline</h1>
  <p>Your application data will sync automatically when you reconnect. Keep recruiting.</p>
  <div class="badge">
    <span class="dot"></span>
    Waiting for connection
  </div>
  <button onclick="window.location.reload()">Try again</button>
</body>
</html>
